coroutines:
  # Flags direct Dispatchers.* usage in production code (should be injected
  # for testability) — noisy false positive in test source sets, where
  # building a real in-memory Room DB / MockEngine test double with a
  # concrete dispatcher is the standard, correct pattern, not a DI smell.
  InjectDispatcher:
    active: true
    excludes: ["**/test/**", "**/androidTest/**", "**/*Test.kt"]

complexity:
  # @Composable-функції — декларативний UI: розмір/кількість параметрів там
  # задаються дизайном компонента (у Material3 Button — 9 параметрів), а не
  # складністю логіки. Для звичайних функцій пороги лишаються чинними.
  LongMethod:
    threshold: 40
    ignoreAnnotated: ["Composable"]
  LongParameterList:
    active: true
    # 7, not the default 6: androidAppModule(...) (M12.5) takes context plus 3 Firebase
    # resource-sourced values (apiKey/projectId/storageBucket, all from google-services.json)
    # plus 2 BuildConfig-sourced keys, and EpisodeProcessingPipeline's constructor grew a
    # photoUploadClient seam alongside its existing 5 - real parameter objects here would
    # only be used at these one-off call sites.
    functionThreshold: 7
    ignoreAnnotated: ["Composable"]
  TooManyFunctions:
    active: true
    thresholdInFiles: 15

style:
  # Вимкнено на старті — забагато шуму на ранньому етапі проєкту,
  # варто увімкнути пізніше, коли з'явиться конкретний домен констант
  MagicNumber:
    active: false

  # Private @Preview composables are invoked reflectively by
  # ComposablePreviewScanner/Roborazzi (generateComposePreviewRobolectricTests),
  # never called directly from Kotlin source - real usage, not dead code.
  UnusedPrivateMember:
    ignoreAnnotated: ["Preview"]

naming:
  # @Composable-функції за конвенцією PascalCase (це не порушення стилю).
  # "Test" покриває як kotlin.test.Test (jvmTest/commonTest), так і org.junit.Test
  # (androidHostTest, Robolectric+Compose) - backtick-named test-функції з пробілами
  # інакше не проходять патерн [a-z][a-zA-Z0-9]*.
  FunctionNaming:
    ignoreAnnotated: ["Composable", "Test"]

# Compose-специфічні правила (ru.kode:detekt-rules-compose)
compose:
  ReusedModifierInstance:
    active: true
  UnnecessaryEventHandlerParameter:
    active: true
  ModifierHeightWithText:
    active: true
  ComposableEventParameterNaming:
    active: true
  ComposableParametersOrdering:
    active: true
  MissingModifierDefaultValue:
    active: true
