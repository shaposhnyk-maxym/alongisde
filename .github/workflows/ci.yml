name: CI

on:
  pull_request:
    branches: [ main ]
  push:
    branches: [ main ]

# Якщо запушиш ще один коміт у той самий PR, попередній прогін
# скасовується автоматично — економить хвилини
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    # Обов'язково для github/codeql-action/upload-sarif — без цього
    # завантаження SARIF-звіту в Code Scanning відхилиться з помилкою прав
    permissions:
      contents: read
      security-events: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Gradle (з кешем)
        uses: gradle/actions/setup-gradle@v4

      - name: Lint (ktlint / Google Kotlin Style Guide)
        run: ./gradlew ktlintCheck

      - name: Detekt (код-смели, складність, Compose-специфічні перевірки)
        run: ./gradlew detekt

      - name: Завантажити SARIF у GitHub Code Scanning
        if: success() || failure()
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: build/reports/detekt/merge.sarif

      - name: Unit tests (commonTest усіх модулів)
        run: ./gradlew allTests

      # Точні назви тасок нижче — орієнтовні, уточнити коли модулі
      # будуть реально створені (залежить від назв твоїх source set'ів)
      - name: Integration tests
        run: ./gradlew :core:database:jvmTest :core:network:jvmTest :data:jvmTest

      - name: Screenshot tests (Roborazzi)
        run: ./gradlew verifyRoborazziDebug

      - name: Завантажити diff-скріншоти, якщо тест не пройшов
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: screenshot-diffs
          path: '**/build/outputs/roborazzi/**'

      - name: Android debug build
        run: ./gradlew :androidApp:assembleDebug

      - name: Desktop playground build check
        run: ./gradlew :playground:build
